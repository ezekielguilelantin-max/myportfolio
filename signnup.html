<!DOCTYPE html>
<html lang="tl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mag-sign Up & Mag-login - Magandang Blue Design</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #74b9ff 0%, #0984e3 100%);
            background-size: 400% 400%;
            animation: backgroundShift 10s ease-in-out infinite, backgroundPulse 5s ease-in-out infinite alternate;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 80%, rgba(255, 255, 255, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(255, 255, 255, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 40% 40%, rgba(255, 255, 255, 0.05) 0%, transparent 50%);
            animation: floatShapes 15s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes backgroundShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes backgroundPulse {
            0% { filter: brightness(1); }
            100% { filter: brightness(1.1); }
        }
        @keyframes floatShapes {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-10px) rotate(90deg); }
            50% { transform: translateY(10px) rotate(180deg); }
            75% { transform: translateY(-5px) rotate(270deg); }
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
            animation: fadeInUp 1s ease-out, containerGlow 3s ease-in-out infinite alternate;
            position: relative;
            z-index: 1;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes containerGlow {
            0% { box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2); }
            100% { box-shadow: 0 15px 40px rgba(74, 144, 226, 0.3); }
        }
        h1 {
            color: #4a90e2;
            margin-bottom: 20px;
            font-weight: 500;
            animation: slideIn 0.8s ease-out, textGlow 2s ease-in-out infinite alternate;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        @keyframes textGlow {
            0% { text-shadow: 0 0 5px rgba(74, 144, 226, 0.5); }
            100% { text-shadow: 0 0 15px rgba(74, 144, 226, 0.8); }
        }
        input[type="text"], input[type="email"], input[type="password"] {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s, transform 0.2s, box-shadow 0.3s;
            animation: inputSlideIn 0.6s ease-out;
        }
        input[type="text"]:focus, input[type="email"]:focus, input[type="password"]:focus {
            border-color: #4a90e2;
            outline: none;
            transform: scale(1.02);
            box-shadow: 0 0 10px rgba(74, 144, 226, 0.3);
        }
        @keyframes inputSlideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #4a90e2 0%, #357abd 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s, box-shadow 0.3s;
            margin-top: 10px;
            animation: buttonBounce 0.7s ease-out;
            position: relative;
            overflow: hidden;
        }
        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }
        button:hover {
            background: linear-gradient(135deg, #357abd 0%, #2c5aa0 100%);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        button:hover::before {
            left: 100%;
        }
        @keyframes buttonBounce {
            0% {
                opacity: 0;
                transform: scale(0.9);
            }
            50% {
                transform: scale(1.05);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }
        .message {
            margin-top: 20px;
            font-size: 14px;
            color: #666;
            animation: messageFade 0.5s ease-out;
        }
        .message.error {
            animation: messageFade 0.5s ease-out, shake 0.5s ease-in-out;
        }
        .message.success {
            animation: messageFade 0.5s ease-out, slideInRight 0.5s ease-out;
        }
        @keyframes messageFade {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        .error {
            color: #e74c3c;
        }
        .success {
            color: #27ae60;
        }
        .toggle {
            margin-top: 20px;
            font-size: 14px;
            animation: toggleSlide 0.8s ease-out;
        }
        @keyframes toggleSlide {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .toggle a {
            color: #4a90e2;
            text-decoration: none;
            transition: color 0.3s, transform 0.2s;
            position: relative;
        }
        .toggle a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: #4a90e2;
            transition: width 0.3s;
        }
        .toggle a:hover {
            text-decoration: none;
            color: #357abd;
            transform: scale(1.05);
        }
        .toggle a:hover::after {
            width: 100%;
        }
        .hidden {
            display: none;
        }
        .welcome {
            font-size: 18px;
            color: #27ae60;
            animation: welcomePulse 1s ease-out, welcomeGlow 2s ease-in-out infinite alternate;
        }
        @keyframes welcomePulse {
            0% { transform: scale(0.9); opacity: 0; }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes welcomeGlow {
            0% { text-shadow: 0 0 5px rgba(39, 174, 96, 0.5); }
            100% { text-shadow: 0 0 15px rgba(39, 174, 96, 0.8); }
        }
        /* Additional animations for form transitions */
        #signupSection, #loginSection {
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        #signupSection.hidden, #loginSection.hidden {
            opacity: 0;
            transform: translateX(-20px);
        }
        #welcomeSection {
            animation: welcomeFadeIn 0.8s ease-out;
        }
        @keyframes welcomeFadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="authContainer">
            <div id="signupSection">
                <h1>Sumali Sa Amin Ngayon</h1>
                <form id="signupForm">
                    <input type="text" id="signupName" placeholder="Buong Pangalan" required>
                    <input type="email" id="signupEmail" placeholder="Tirahan ng Email" required>
                    <input type="password" id="signupPassword" placeholder="Password (min 8 na karakter)" required>
                    <button type="submit">Mag-sign Up</button>
                </form>
                <div class="toggle">
                    Mayroon ka nang account? <a href="#" id="showLogin">Mag-login</a>
                </div>
            </div>
            <div id="loginSection" class="hidden">
                <h1>Maligayang Pagbabalik</h1>
                <form id="loginForm">
                    <input type="email" id="loginEmail" placeholder="Tirahan ng Email" required>
                    <input type="password" id="loginPassword" placeholder="Password" required>
                    <button type="submit">Mag-login</button>
                </form>
                <div class="toggle">
                    Wala ka pang account? <a href="#" id="showSignup">Mag-sign Up</a>
                </div>
            </div>
        </div>
        <div id="welcomeSection" class="hidden">
            <h1 class="welcome">Maligayang Pagdating, <span id="userName"></span>!</h1>
            <p>Naka-login ka na ngayon.</p>
            <button id="logoutBtn">Mag-log Out</button>
        </div>
        <div id="message" class="message"></div>
    </div>

    <script>
        // Utility functions for localStorage
        function getUsers() {
            return JSON.parse(localStorage.getItem('users')) || [];
        }

        function saveUsers(users) {
            localStorage.setItem('users', JSON.stringify(users));
        }

        function getCurrentUser() {
            return JSON.parse(localStorage.getItem('currentUser')) || null;
        }

        function setCurrentUser(user) {
            localStorage.setItem('currentUser', JSON.stringify(user));
        }

        function clearCurrentUser() {
            localStorage.removeItem('currentUser');
        }

        // Check if user is already logged in on page load
        window.addEventListener('load', function() {
            const currentUser = getCurrentUser();
            if (currentUser) {
                showWelcome(currentUser.name);
            }
        });

        // Toggle between signup and login
        document.getElementById('showLogin').addEventListener('click', function(e) {
            e.preventDefault();
            document.getElementById('signupSection').classList.add('hidden');
            document.getElementById('loginSection').classList.remove('hidden');
            document.getElementById('message').textContent = '';
        });

        document.getElementById('showSignup').addEventListener('click', function(e) {
            e.preventDefault();
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('signupSection').classList.remove('hidden');
            document.getElementById('message').textContent = '';
        });

        // Signup form handler
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('signupName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value;
            const messageDiv = document.getElementById('message');

            // Basic validation
            if (!name || !email || !password) {
                messageDiv.textContent = 'Pakipunan ang lahat ng field.';
                messageDiv.className = 'message error';
                return;
            }
            if (!/\S+@\S+\.\S+/.test(email)) {
                messageDiv.textContent = 'Pakilagay ang wastong email.';
                messageDiv.className = 'message error';
                return;
            }
            if (password.length < 8) {
                messageDiv.textContent = 'Ang password ay dapat hindi bababa sa 8 na karakter.';
                messageDiv.className = 'message error';
                return;
            }

            // Check if user already exists
            const users = getUsers();
            const existingUser = users.find(user => user.email === email);
            if (existingUser) {
                messageDiv.textContent = 'Mayroon nang account sa email na ito.';
                messageDiv.className = 'message error';
                return;
            }

            // Add new user
            users.push({ name, email, password });
            saveUsers(users);

            // Success message and auto-login
            messageDiv.textContent = 'Matagumpay ang pag-sign up! Naka-login ka na ngayon.';
            messageDiv.className = 'message success';
            setCurrentUser({ name, email });
            showWelcome(name);

            // Clear form
            document.getElementById('signupForm').reset();
        });

        // Login form handler
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const messageDiv = document.getElementById('message');

            // Basic validation
            if (!email || !password) {
                messageDiv.textContent = 'Pakipunan ang lahat ng field.';
                messageDiv.className = 'message error';
                return;
            }

            // Check credentials
            const users = getUsers();
            const user = users.find(u => u.email === email && u.password === password);
            if (!user) {
                messageDiv.textContent = 'Hindi wastong email o password.';
                messageDiv.className = 'message error';
                return;
            }

            // Login success
            messageDiv.textContent = 'Matagumpay ang pag-login!';
            messageDiv.className = 'message success';
            setCurrentUser({ name: user.name, email: user.email });
            showWelcome(user.name);

            // Clear form
            document.getElementById('loginForm').reset();
        });

        // Logout handler
        document.getElementById('logoutBtn').addEventListener('click', function() {
            clearCurrentUser();
            document.getElementById('welcomeSection').classList.add('hidden');
            document.getElementById('authContainer').classList.remove('hidden');
            document.getElementById('signupSection').classList.remove('hidden');
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('message').textContent = '';
        });

        // Function to show welcome screen
        function showWelcome(name) {
            document.getElementById('userName').textContent = name;
            document.getElementById('authContainer').classList.add('hidden');
            document.getElementById('welcomeSection').classList.remove('hidden');
        }
    </script>
</body>
</html>
